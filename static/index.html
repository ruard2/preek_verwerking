<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preekverwerker</title>
<style>
  :root {
    --groen: #2c5f2d; --groen-licht: #eaf3ea; --rand: #e2e2dd;
    --tekst: #23231f; --grijs: #6b6b64; --bg: #faf9f5; --kaart: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --groen: #7bb87c; --groen-licht: #1c2a1c; --rand: #33332e;
      --tekst: #ecebe4; --grijs: #a5a59b; --bg: #17171a; --kaart: #1f1f22;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif; max-width: 48rem;
    margin: 0 auto; padding: 2.5rem 1.25rem 5rem; line-height: 1.65;
    background: var(--bg); color: var(--tekst);
  }
  h1 { font-size: 1.7rem; margin: 0 0 .2rem; color: var(--groen); }
  .sub { color: var(--grijs); margin-top: 0; font-size: .95rem; }
  h2 { font-size: 1.05rem; margin: 2rem 0 .6rem; }
  button, .knoplink {
    font-family: inherit; font-size: 1rem; border: none;
    border-radius: .5rem; cursor: pointer;
  }
  form.kanaal { display: flex; gap: .5rem; flex-wrap: wrap; margin: 1.25rem 0 .5rem; }
  form.kanaal input {
    flex: 1 1 22rem; padding: .6rem .8rem; font-size: 1rem;
    border: 1px solid var(--rand); border-radius: .5rem;
    background: var(--kaart); color: var(--tekst);
  }
  form.kanaal button {
    padding: .6rem 1.3rem; background: var(--groen); color: #fff;
  }
  .recent { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .5rem; }
  .chip {
    font-size: .82rem; padding: .3rem .7rem; border: 1px solid var(--rand);
    border-radius: 1rem; background: var(--kaart); color: var(--grijs);
    cursor: pointer;
  }
  .chip:hover { border-color: var(--groen); color: var(--tekst); }
  .dag { margin-bottom: 1.1rem; }
  .dag-kop {
    font-size: .8rem; text-transform: uppercase; letter-spacing: .06em;
    color: var(--grijs); margin-bottom: .4rem;
  }
  .knoppen { display: flex; flex-wrap: wrap; gap: .5rem; }
  .dienst-knop {
    display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1rem;
    background: var(--groen); color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.12);
  }
  .dienst-knop:hover { transform: translateY(-1px); }
  .dienst-knop.gepland {
    background: transparent; color: var(--grijs); border: 1px dashed var(--rand);
    box-shadow: none; cursor: default;
  }
  .klein {
    background: var(--kaart); color: var(--tekst); border: 1px solid var(--rand);
    padding: .45rem 1rem; font-size: .9rem;
  }
  .klein:hover { border-color: var(--groen); }
  details { margin-top: 1.2rem; }
  summary { cursor: pointer; color: var(--grijs); font-size: .95rem; }
  #stap { color: var(--grijs); font-style: italic; min-height: 1.2rem; }
  .laadbalk {
    height: 3px; border-radius: 3px; background: var(--groen-licht);
    overflow: hidden; margin: .5rem 0 0; display: none;
  }
  .laadbalk.aan { display: block; }
  .laadbalk::before {
    content: ''; display: block; height: 100%; width: 40%;
    background: var(--groen); border-radius: 3px;
    animation: schuif 1.3s ease-in-out infinite;
  }
  @keyframes schuif { 0%{margin-left:-40%} 100%{margin-left:100%} }
  #fout { color: #c0392b; white-space: pre-wrap; }
  #resultaat { margin-top: 1.5rem; }
  .balk { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-bottom: 1.25rem; }
  .balk .rechts { margin-left: auto; display: flex; gap: .5rem; }
  .titelkaart {
    background: var(--groen); color: #fff; border-radius: .7rem;
    padding: 1.4rem 1.5rem; margin-bottom: 1.25rem;
  }
  .titelkaart h3 { margin: 0 0 .4rem; font-size: 1.5rem; }
  .titelkaart .meta { font-size: .9rem; opacity: .9; }
  .titelkaart .meta span { display: inline-block; margin-right: 1rem; }
  .kaart {
    background: var(--kaart); border: 1px solid var(--rand);
    border-radius: .7rem; padding: 1.1rem 1.3rem; margin-bottom: .9rem;
  }
  .kaart h4 { margin: 0 0 .5rem; color: var(--groen); font-size: 1.15rem; }
  .label {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .07em;
    color: var(--grijs); margin: .7rem 0 .15rem; font-family: system-ui, sans-serif;
  }
  .citaat {
    font-style: italic; border-left: 3px solid var(--groen);
    padding-left: .8rem; margin: .1rem 0;
  }
  .kaart p { margin: .1rem 0; }
  .vraag { background: var(--groen-licht); border-radius: .4rem; padding: .5rem .7rem; }
  .samenvatting { font-size: 1.02rem; }
</style>
</head>
<body>
  <h1>Preekverwerker</h1>
  <p class="sub">Plak een <b>kanaal</b> (YouTube-kanaal of Kerkdienstgemist-kerk)
  om alle diensten te zien, of een <b>directe link</b> naar één preek.</p>

  <form class="kanaal" id="kanaalform">
    <input type="url" id="kanaal" placeholder="https://youtube.com/@…  ·  https://kerkdienstgemist.nl/stations/…  ·  of een preek-link">
    <button type="submit">Laden</button>
  </form>
  <div class="recent" id="recent"></div>

  <p id="stap"></p>
  <div class="laadbalk" id="laadbalk"></div>
  <p id="fout"></p>

  <div id="lijst"></div>
  <div id="resultaat"></div>
  <p id="versie" style="margin-top:3rem;font-size:.72rem;opacity:.45;font-family:system-ui,sans-serif"></p>

<script>
const kanaalForm = document.getElementById('kanaalform');
const kanaalInput = document.getElementById('kanaal');
const recentEl = document.getElementById('recent');
const stapEl = document.getElementById('stap');
const laadbalk = document.getElementById('laadbalk');
const foutEl = document.getElementById('fout');
const lijstEl = document.getElementById('lijst');
const resultaatEl = document.getElementById('resultaat');
let bezig = false;
let huidigKanaal = null;
const WEEKDAG = {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'};

function bezigStand(aan) { bezig = aan; laadbalk.classList.toggle('aan', aan); }

// ---- Recente kanalen (localStorage) ----
function recenteKanalen() {
  try { return JSON.parse(localStorage.getItem('kanalen') || '[]'); } catch { return []; }
}
function onthoudKanaal(url) {
  let lijst = recenteKanalen().filter(u => u !== url);
  lijst.unshift(url);
  localStorage.setItem('kanalen', JSON.stringify(lijst.slice(0, 6)));
  toonRecent();
}
function kortLabel(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('kerkdienstgemist')) {
      const m = u.pathname.match(/stations\/(\d+)/);
      return 'Kerkdienstgemist ' + (m ? m[1] : '');
    }
    const h = u.pathname.match(/@[\w.-]+/);
    return 'YouTube ' + (h ? h[0] : u.pathname.split('/').filter(Boolean)[0] || '');
  } catch { return url.slice(0, 30); }
}
function toonRecent() {
  const lijst = recenteKanalen();
  recentEl.innerHTML = '';
  lijst.forEach(url => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.textContent = kortLabel(url);
    c.title = url;
    c.addEventListener('click', () => { kanaalInput.value = url; laadKanaal(url); });
    recentEl.appendChild(c);
  });
}

// ---- Kanaal laden of enkele link verwerken ----
kanaalForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const url = kanaalInput.value.trim();
  if (url) laadKanaal(url);
});

async function laadKanaal(url, vernieuw = false) {
  if (bezig) return;
  stapEl.textContent = 'Laden…';
  laadbalk.classList.add('aan');
  foutEl.textContent = '';
  resultaatEl.innerHTML = '';
  lijstEl.innerHTML = '';
  try {
    const q = new URLSearchParams({url: url || '', vernieuw: vernieuw ? 'true' : 'false'});
    const antwoord = await fetch('/api/kanaal?' + q);
    if (!antwoord.ok) {
      throw new Error(await fouttekst(antwoord, 'Kon de link niet laden.'));
    }
    const data = await antwoord.json();
    stapEl.textContent = '';
    laadbalk.classList.remove('aan');
    if (data.soort === 'enkel') {
      verwerk(data.url, 'geplakte preek-link');
    } else {
      huidigKanaal = data.kanaal;
      window._diensten = data.diensten;
      if (url) onthoudKanaal(data.kanaal);
      toonLijst(data.diensten);
    }
  } catch (fout) {
    stapEl.textContent = '';
    laadbalk.classList.remove('aan');
    foutEl.textContent = fout.message;
  }
}

function toonLijst(diensten) {
  lijstEl.innerHTML = '';
  resultaatEl.innerHTML = '';
  lijstEl.style.display = '';

  const beschikbaar = diensten.filter(d => !d.gepland);
  const gepland = diensten.filter(d => d.gepland);

  const kop = document.createElement('h2');
  kop.textContent = 'Beschikbare diensten' + (beschikbaar.length ? ` (${beschikbaar.length})` : '');
  lijstEl.appendChild(kop);
  if (!beschikbaar.length) {
    lijstEl.appendChild(el('p', 'sub', 'Geen diensten gevonden voor dit kanaal.'));
  }
  lijstEl.appendChild(maakGroepen(beschikbaar, false));

  if (gepland.length) {
    const det = document.createElement('details');
    det.appendChild(el('summary', null, `Geplande diensten (${gepland.length}) — nog niet gestreamd`));
    det.appendChild(maakGroepen(gepland.slice().reverse(), true));
    lijstEl.appendChild(det);
  }

  const vernieuwKnop = el('button', 'klein', 'Vernieuw lijst');
  vernieuwKnop.style.marginTop = '1.2rem';
  vernieuwKnop.addEventListener('click', () => laadKanaal(huidigKanaal, true));
  lijstEl.appendChild(vernieuwKnop);
}

function maakGroepen(diensten, isGepland) {
  const houder = document.createElement('div');
  const perDag = new Map();
  for (const d of diensten) {
    const sleutel = d.datum || 'onbekend';
    if (!perDag.has(sleutel)) perDag.set(sleutel, []);
    perDag.get(sleutel).push(d);
  }
  for (const [datum, items] of perDag) {
    const blok = el('div', 'dag');
    const kop = el('div', 'dag-kop', datum === 'onbekend'
      ? 'Datum onbekend'
      : new Date(datum + 'T12:00:00').toLocaleDateString('nl-NL', WEEKDAG));
    blok.appendChild(kop);
    const kn = el('div', 'knoppen');
    items.sort((a, b) => (a.tijd || '').localeCompare(b.tijd || ''));
    for (const d of items) {
      const knop = el('button', 'dienst-knop' + (isGepland ? ' gepland' : ''),
        d.label + (d.tijd ? ` · ${d.tijd}` : ''));
      if (isGepland) {
        knop.disabled = true;
        knop.title = 'Deze dienst is nog niet geweest.';
      } else {
        knop.addEventListener('click', () => verwerk(d.url, `${kop.textContent} — ${d.label}`));
      }
      kn.appendChild(knop);
    }
    blok.appendChild(kn);
    houder.appendChild(blok);
  }
  return houder;
}

async function verwerk(url, omschrijving) {
  if (bezig) return;
  bezigStand(true);
  lijstEl.style.display = 'none';
  resultaatEl.innerHTML = '';
  foutEl.textContent = '';
  stapEl.textContent = `Bezig met: ${omschrijving}…`;
  try {
    const antwoord = await fetch('/api/verwerk', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    if (!antwoord.ok) {
      throw new Error(await fouttekst(antwoord, 'De verwerking kon niet worden gestart.'));
    }
    const {taak_id} = await antwoord.json();
    await volg(taak_id);
  } catch (fout) {
    stapEl.textContent = '';
    foutEl.textContent = fout.message;
    lijstEl.style.display = '';
  } finally {
    bezigStand(false);
  }
}

async function volg(taakId) {
  while (true) {
    await new Promise(r => setTimeout(r, 2500));
    const antwoord = await fetch('/api/status/' + taakId);
    if (antwoord.status === 404) throw new Error(
      'De verwerking is onderbroken doordat de server opnieuw is gestart. '
      + 'Klik de dienst opnieuw aan.');
    if (!antwoord.ok) throw new Error('De status kon niet worden opgehaald.');
    const taak = await antwoord.json();
    if (taak.status === 'bezig') stapEl.textContent = taak.stap;
    else if (taak.status === 'fout') throw new Error(taak.fout || 'Er is iets misgegaan.');
    else { stapEl.textContent = ''; toonResultaat(taak); return; }
  }
}

// Foutmelding uit een mislukt antwoord halen; FastAPI's detail kan een string
// zijn of een lijst validatiefouten (anders zou je "[object Object]" zien).
async function fouttekst(antwoord, standaard) {
  const d = await antwoord.json().catch(() => ({}));
  if (typeof d.detail === 'string') return d.detail;
  if (Array.isArray(d.detail)) return d.detail.map(e => e.msg || '').join('; ') || standaard;
  return standaard;
}

function el(tag, cls, tekst) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (tekst != null) e.textContent = tekst;
  return e;
}

function toonResultaat(taak) {
  const res = taak.resultaat || {};
  const data = res.data;
  resultaatEl.innerHTML = '';

  const balk = el('div', 'balk');
  const terug = el('button', 'klein', '← Terug naar de lijst');
  terug.addEventListener('click', () => {
    resultaatEl.innerHTML = '';
    if (window._diensten) toonLijst(window._diensten); else lijstEl.style.display = '';
  });
  balk.appendChild(terug);
  const rechts = el('div', 'rechts');
  const kopieer = el('button', 'klein', 'Kopieer tekst');
  kopieer.addEventListener('click', async () => {
    await navigator.clipboard.writeText(res.tekst || '');
    kopieer.textContent = 'Gekopieerd ✓';
    setTimeout(() => kopieer.textContent = 'Kopieer tekst', 2000);
  });
  rechts.appendChild(kopieer);
  if (res.video_id) {
    const pdf = el('a', 'klein', 'Download PDF');
    pdf.href = '/api/pdf/' + res.video_id;
    pdf.style.textDecoration = 'none';
    rechts.appendChild(pdf);
  }
  balk.appendChild(rechts);
  resultaatEl.appendChild(balk);

  if (!data) {
    const pre = el('pre'); pre.style.whiteSpace = 'pre-wrap';
    pre.textContent = res.tekst || '';
    resultaatEl.appendChild(pre); return;
  }

  const L = data._labels || {};
  const titelkaart = el('div', 'titelkaart');
  titelkaart.appendChild(el('h3', null, data.titel || ''));
  const meta = el('div', 'meta');
  if (data.bijbelgedeelte)
    meta.appendChild(el('span', null, `${L.bijbelgedeelte || 'Bijbelgedeelte'}: ${data.bijbelgedeelte}`));
  if (data.voorganger)
    meta.appendChild(el('span', null, `${L.voorganger || 'Voorganger'}: ${data.voorganger}`));
  titelkaart.appendChild(meta);
  resultaatEl.appendChild(titelkaart);

  const sam = el('div', 'kaart');
  sam.appendChild(el('h4', null, L.samenvatting || 'Samenvatting'));
  sam.appendChild(el('p', 'samenvatting', data.samenvatting || ''));
  resultaatEl.appendChild(sam);

  (data.dagen || []).forEach((dag, i) => {
    const k = el('div', 'kaart');
    k.appendChild(el('h4', null, `${L.dag || 'Dag'} ${i + 1} – ${dag.titel || ''}`));
    k.appendChild(el('div', 'label', L.bijbeltekst || 'Bijbeltekst'));
    k.appendChild(el('p', 'citaat', dag.bijbeltekst || ''));
    k.appendChild(el('div', 'label', L.gedachte || 'Gedachte'));
    k.appendChild(el('p', null, dag.gedachte || ''));
    k.appendChild(el('div', 'label', L.vraag || 'Vraag'));
    k.appendChild(el('p', 'vraag', dag.vraag_volwassenen || ''));
    k.appendChild(el('div', 'label', L.vraag_kinderen || 'Vraag voor kinderen'));
    k.appendChild(el('p', 'vraag', dag.vraag_kinderen || ''));
    resultaatEl.appendChild(k);
  });

  if (data.liturgie) {
    const det = document.createElement('details');
    det.className = 'kaart';
    const som = el('summary', null, L.liturgie || 'Liturgie');
    som.style.color = 'var(--groen)';
    det.appendChild(som);
    const pre = el('p'); pre.style.whiteSpace = 'pre-wrap'; pre.style.marginTop = '.6rem';
    pre.textContent = data.liturgie;
    det.appendChild(pre);
    resultaatEl.appendChild(det);
  }
}

// Draaiende versie tonen (helpt bevestigen dat een nieuwe deploy live is).
fetch('/api/diagnose').then(r => r.json()).then(d => {
  document.getElementById('versie').textContent =
    'versie ' + (d.versie || '?') + (d.transcript_bron ? ' · ' + d.transcript_bron : '');
}).catch(() => {});

// Startup: prefill met het laatst gebruikte kanaal en laad het automatisch.
toonRecent();
const laatste = recenteKanalen()[0];
if (laatste) { kanaalInput.value = laatste; laadKanaal(laatste); }
else { laadKanaal(''); }  // standaardkanaal (server-side KANAAL_URL)
</script>
</body>
</html>
