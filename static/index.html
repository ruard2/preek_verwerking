<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preekverwerker</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    max-width: 46rem;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    line-height: 1.6;
  }
  h1 { font-size: 1.6rem; margin-bottom: .25rem; }
  h2 { font-size: 1.15rem; margin: 1.75rem 0 .5rem; }
  .sub { opacity: .7; margin-top: 0; font-size: .95rem; }
  button {
    font-family: inherit;
    font-size: 1rem;
    border: none;
    border-radius: .4rem;
    cursor: pointer;
  }
  .dag { margin-bottom: 1rem; }
  .dag-kop { font-weight: bold; margin-bottom: .35rem; text-transform: capitalize; }
  .dienst-knop {
    display: inline-block;
    margin: 0 .5rem .5rem 0;
    padding: .5rem 1rem;
    background: #2c5f2d;
    color: #fff;
  }
  .dienst-knop:disabled { opacity: .5; cursor: not-allowed; }
  .dienst-knop.gepland {
    background: transparent;
    color: inherit;
    border: 1px dashed #999;
    opacity: .6;
    cursor: default;
  }
  .klein { background: #555; color: #fff; padding: .4rem .9rem; font-size: .9rem; }
  #stap { font-style: italic; opacity: .8; }
  #fout { color: #b00020; white-space: pre-wrap; }
  #resultaat {
    white-space: pre-wrap;
    border-top: 2px solid #2c5f2d;
    padding-top: 1.5rem;
    margin-top: 1.5rem;
  }
  #acties { margin-top: 1rem; display: none; gap: .5rem; }
  details { margin-top: 2rem; font-size: .95rem; }
  details input[type=url] {
    width: 100%;
    box-sizing: border-box;
    padding: .5rem .7rem;
    font-size: 1rem;
    border: 1px solid #aaa;
    border-radius: .4rem;
    margin: .5rem 0;
  }
</style>
</head>
<body>
  <h1>Preekverwerker</h1>
  <p class="sub">Kies een dienst van NGK Middelharnis. De preek wordt opgezocht,
  getranscribeerd en verwerkt tot een samenvatting met zeven daggedeelten.</p>

  <p id="stap">Diensten ophalen...</p>
  <p id="fout"></p>

  <div id="lijst"></div>

  <div id="resultaat"></div>
  <div id="acties">
    <button type="button" class="klein" id="kopieer">Kopieer tekst</button>
    <button type="button" class="klein" id="terug">Terug naar de lijst</button>
  </div>

  <details id="handmatig">
    <summary>Of plak zelf een YouTube-link</summary>
    <input type="url" id="url" placeholder="https://www.youtube.com/watch?v=...">
    <button type="button" class="klein" id="urlknop">Verwerk deze link</button>
  </details>

<script>
const stapEl = document.getElementById('stap');
const foutEl = document.getElementById('fout');
const lijstEl = document.getElementById('lijst');
const resultaatEl = document.getElementById('resultaat');
const acties = document.getElementById('acties');
const handmatig = document.getElementById('handmatig');
let bezig = false;

const WEEKDAG = {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'};

async function laadDiensten(vernieuw = false) {
  stapEl.textContent = 'Diensten ophalen...';
  foutEl.textContent = '';
  try {
    const antwoord = await fetch('/api/diensten' + (vernieuw ? '?vernieuw=true' : ''));
    if (!antwoord.ok) {
      const data = await antwoord.json().catch(() => ({}));
      throw new Error(data.detail || 'De dienstenlijst kon niet worden opgehaald.');
    }
    toonLijst(await antwoord.json());
    stapEl.textContent = '';
  } catch (fout) {
    stapEl.textContent = '';
    foutEl.textContent = fout.message;
  }
}

function toonLijst(diensten) {
  lijstEl.innerHTML = '';

  const beschikbaar = diensten.filter(d => !d.gepland);
  const gepland = diensten.filter(d => d.gepland);

  const kopB = document.createElement('h2');
  kopB.textContent = 'Beschikbare diensten';
  lijstEl.appendChild(kopB);
  lijstEl.appendChild(maakGroepen(beschikbaar, false));

  if (gepland.length) {
    const det = document.createElement('details');
    const som = document.createElement('summary');
    som.textContent = `Geplande diensten (${gepland.length}) — nog niet gestreamd`;
    det.appendChild(som);
    det.appendChild(maakGroepen(gepland.slice().reverse(), true));
    lijstEl.appendChild(det);
  }

  const vernieuwKnop = document.createElement('button');
  vernieuwKnop.textContent = 'Vernieuw lijst';
  vernieuwKnop.className = 'klein';
  vernieuwKnop.addEventListener('click', () => laadDiensten(true));
  lijstEl.appendChild(vernieuwKnop);
}

function maakGroepen(diensten, isGepland) {
  const houder = document.createElement('div');
  const perDag = new Map();
  for (const d of diensten) {
    const sleutel = d.datum || 'onbekend';
    if (!perDag.has(sleutel)) perDag.set(sleutel, []);
    perDag.get(sleutel).push(d);
  }
  for (const [datum, items] of perDag) {
    const blok = document.createElement('div');
    blok.className = 'dag';
    const kop = document.createElement('div');
    kop.className = 'dag-kop';
    kop.textContent = datum === 'onbekend'
      ? 'Datum onbekend'
      : new Date(datum + 'T12:00:00').toLocaleDateString('nl-NL', WEEKDAG);
    blok.appendChild(kop);
    items.sort((a, b) => (a.tijd || '').localeCompare(b.tijd || ''));
    for (const d of items) {
      const knop = document.createElement('button');
      knop.className = 'dienst-knop' + (isGepland ? ' gepland' : '');
      knop.textContent = d.label + (d.tijd ? ` · ${d.tijd}` : '');
      if (isGepland) {
        knop.disabled = true;
        knop.title = 'Deze dienst is nog niet geweest.';
      } else {
        knop.addEventListener('click', () => verwerk(d.url, `${kop.textContent} — ${d.label}`));
      }
      blok.appendChild(knop);
    }
    houder.appendChild(blok);
  }
  return houder;
}

async function verwerk(url, omschrijving) {
  if (bezig) return;
  bezig = true;
  lijstEl.style.display = 'none';
  handmatig.style.display = 'none';
  acties.style.display = 'none';
  resultaatEl.textContent = '';
  foutEl.textContent = '';
  stapEl.textContent = `Bezig met: ${omschrijving}...`;

  try {
    const antwoord = await fetch('/api/verwerk', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    if (!antwoord.ok) {
      const data = await antwoord.json().catch(() => ({}));
      throw new Error(data.detail || 'De verwerking kon niet worden gestart.');
    }
    const {taak_id} = await antwoord.json();
    await volg(taak_id);
  } catch (fout) {
    stapEl.textContent = '';
    foutEl.textContent = fout.message;
    lijstEl.style.display = '';
    handmatig.style.display = '';
  } finally {
    bezig = false;
  }
}

async function volg(taakId) {
  while (true) {
    await new Promise(r => setTimeout(r, 2500));
    const antwoord = await fetch('/api/status/' + taakId);
    if (!antwoord.ok) throw new Error('De status kon niet worden opgehaald.');
    const taak = await antwoord.json();
    if (taak.status === 'bezig') {
      stapEl.textContent = taak.stap;
    } else if (taak.status === 'fout') {
      throw new Error(taak.fout || 'Er is iets misgegaan.');
    } else {
      stapEl.textContent = taak.meta
        ? `Klaar. Preek: ${taak.meta.preek_start}–${taak.meta.preek_einde} uit “${taak.meta.titel}”.`
        : 'Klaar.';
      resultaatEl.textContent = taak.resultaat;
      acties.style.display = 'flex';
      return;
    }
  }
}

document.getElementById('kopieer').addEventListener('click', async () => {
  await navigator.clipboard.writeText(resultaatEl.textContent);
  document.getElementById('kopieer').textContent = 'Gekopieerd ✓';
  setTimeout(() => document.getElementById('kopieer').textContent = 'Kopieer tekst', 2000);
});

document.getElementById('terug').addEventListener('click', () => {
  resultaatEl.textContent = '';
  acties.style.display = 'none';
  stapEl.textContent = '';
  lijstEl.style.display = '';
  handmatig.style.display = '';
});

document.getElementById('urlknop').addEventListener('click', () => {
  const url = document.getElementById('url').value.trim();
  if (url) verwerk(url, 'handmatige link');
});

laadDiensten();
</script>
</body>
</html>
